name: Build Docker image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ghcr-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build-${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Write VERSION
        run: |
          git describe --tags --always > VERSION
          cat VERSION

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/xwordsman/new-api

      - name: Build and push ${{ matrix.arch }}
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ghcr.io/xwordsman/new-api:latest-${{ matrix.arch }}
          labels: |
            ${{ steps.meta.outputs.labels }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha,scope=new-api-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=new-api-${{ matrix.arch }}
          provenance: false
          sbom: false

  publish:
    name: publish
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish multi-architecture image
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::7}"
          docker buildx imagetools create \
            --tag ghcr.io/xwordsman/new-api:latest \
            --tag "ghcr.io/xwordsman/new-api:main-${short_sha}" \
            ghcr.io/xwordsman/new-api:latest-amd64 \
            ghcr.io/xwordsman/new-api:latest-arm64

      - name: Inspect published image
        run: docker buildx imagetools inspect ghcr.io/xwordsman/new-api:latest
